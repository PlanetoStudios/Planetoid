<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid Studio | v16.2</title>

    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/lq3tNk9.jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/lq3tNk9.jpeg">
    
    <style>
        :root { 
            --neon: #00ffcc; --purple: #b800ff; --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05); --red: #ff3333; --gold: #ffd700;
        }
        
        body { 
            margin: 0; background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%);
            background-attachment: fixed; color: #f0f0f0; 
            font-family: 'Segoe UI', sans-serif; text-align: center; min-height: 100vh;
        }

        /* Navegação */
        .nav-bar { display: flex; justify-content: center; gap: 20px; background: rgba(0,0,0,0.7); padding: 15px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid var(--purple); }
        .nav-item { cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .btn { background: var(--purple); color: white; border: none; padding: 10px 18px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; margin: 5px; font-size: 13px; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon); background: var(--neon); color: #000; }
        .btn-group { background: transparent; border: 2px solid var(--neon); color: var(--neon); }

        /* Grids e Containers */
        .container { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .active-container { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; backdrop-filter: blur(10px); transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .game-banner { width: 100%; height: 160px; object-fit: cover; }

        /* Badges de Rank */
        .rank-badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; border: 1px solid; display: inline-block; margin-bottom: 10px; }
        .rank-lenda { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .rank-dev { color: var(--neon); border-color: var(--neon); }

        /* Social e Stats */
        .stats-bar { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.3); font-size: 11px; color: #aaa; border-top: 1px solid #222; }
        .stat-item { display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 2% auto; padding: 25px; border: 1px solid var(--purple); width: 90%; max-width: 800px; border-radius: 15px; }
        iframe { width: 100%; height: 60vh; background: #fff; border-radius: 8px; border: none; }
        
        textarea, input { background: #000; color: var(--neon); border: 1px solid #333; padding: 12px; width: 95%; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('hub', this)">GAMES</div>
        <div class="nav-item" onclick="showTab('assets', this)">BIBLIOTECA</div>
        <div class="nav-item" onclick="showTab('perfil', this)">MEU PERFIL</div>
    </div>

    <div id="hub" class="container active-container">
        <div style="margin: 20px 0;">
            <img src="https://i.imgur.com/lq3tNk9.jpeg" style="height: 60px; border-radius: 12px;">
            <h2 style="color:var(--neon); margin: 10px 0;">PLANETOID HUB</h2>
            <button class="btn" onclick="prepareUpload()">[+] NOVO PROJETO</button>
            <button class="btn btn-group" onclick="openModal('groupModal')">ESTÚDIOS</button>
        </div>
        <div id="game-grid"></div>
    </div>

    <div id="perfil" class="container">
        <div class="card" style="max-width: 400px; margin: 40px auto; padding: 30px;">
            <div id="p-badge" class="rank-badge rank-lenda">CARREGANDO...</div>
            <h2 id="p-name" style="color:var(--neon); margin: 5px 0;">PlanetOfc</h2>
            <div style="text-align: left; margin-top: 20px;">
                <p style="font-size: 13px;">Likes Totais: <span id="p-likes" style="color:var(--purple)">0</span></p>
                <p style="font-size: 13px;">Visitas: <span id="p-visits" style="color:var(--purple)">0</span></p>
                <div style="background:#222; height:10px; border-radius:10px; margin-top:10px;">
                    <div id="p-bar" style="width:0%; background:var(--neon); height:100%; border-radius:10px; transition: 1s;"></div>
                </div>
                <small id="p-xp-text">0/100 XP</small>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <button class="btn" style="float:right; background:var(--red)" onclick="closeModal('playerModal')">FECHAR</button>
            <h3 id="playTitle" style="color:var(--neon); text-align: left; margin: 0 0 15px 0;"></h3>
            <iframe id="player-frame"></iframe>
            
            <div style="margin-top: 20px; text-align: left;">
                <h4 style="color:var(--purple)">COMENTÁRIOS</h4>
                <div id="comment-list" style="max-height: 150px; overflow-y: auto; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;"></div>
                <div style="display:flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="comInput" placeholder="Escreva algo..." style="margin:0">
                    <button class="btn" onclick="window.postComment()">ENVIAR</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, update, onDisconnect, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const currentUser = "PlanetOfc";
        let currentGameId = null;

        // --- SISTEMA DE CCU (ONLINE AGORA) ---
        function trackCCU(gameId) {
            const ccuRef = ref(db, `jogos/${gameId}/ccu/${currentUser}`);
            set(ccuRef, true);
            onDisconnect(ccuRef).remove();
        }

        // --- CARREGAR HUB ---
        function loadHub() {
            onValue(ref(db, 'jogos'), (snap) => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const id = child.key;
                    const g = child.val();
                    const likes = g.likes ? Object.keys(g.likes).length : 0;
                    const views = g.views || 0;
                    const ccu = g.ccu ? Object.keys(g.ccu).length : 0;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${g.logo || 'https://i.imgur.com/nfcjTXC.png'}" class="game-banner">
                        <div style="padding:15px">
                            <h3 style="margin:0; color:var(--neon)">${g.name}</h3>
                            <p style="font-size:10px; color:#777">Por: ${g.author}</p>
                            
                            <div class="stats-bar">
                                <span class="stat-item">❤️ ${likes}</span>
                                <span class="stat-item">👁️ ${views}</span>
                                <span class="stat-item"><div class="online-dot"></div> CCU: ${ccu}</span>
                            </div>

                            <div style="display:flex; gap:5px; margin-top:10px">
                                <button class="btn" style="flex:2" onclick="window.playGame('${id}')">JOGAR</button>
                                <button class="btn btn-group" style="flex:1" onclick="window.likeGame('${id}')">❤️</button>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                });
            });
        }

        // --- PLAY E VISITAS ---
        window.playGame = async (id) => {
            currentGameId = id;
            const s = await get(ref(db, `jogos/${id}`));
            const g = s.val();
            
            // Incrementar Visita
            update(ref(db, `jogos/${id}`), { views: increment(1) });
            trackCCU(id);

            document.getElementById('playTitle').innerText = g.name;
            document.getElementById('playerModal').style.display = "block";
            
            // Carregar Iframe (Lógica da v16.1)
            const frame = document.getElementById('player-frame');
            const doc = frame.contentWindow.document;
            let h="", c="", j="";
            g.files.forEach(f => {
                if(f.name.endsWith('.html')) h+=f.content;
                else if(f.name.endsWith('.css')) c+=`<style>${f.content}</style>`;
                else if(f.name.endsWith('.js')) j+=f.content;
            });
            doc.open();
            doc.write(`<html><head>${c}</head><body>${h}<script>${j}<\/script></body></html>`);
            doc.close();

            loadComments(id);
        };

        // --- SISTEMA SOCIAL (LIKE/COMMENT) ---
        window.likeGame = (id) => {
            set(ref(db, `jogos/${id}/likes/${currentUser}`), true);
        };

        window.postComment = () => {
            const text = document.getElementById('comInput').value;
            if(!text || !currentGameId) return;
            push(ref(db, `jogos/${currentGameId}/comments`), {
                user: currentUser,
                text: text,
                date: Date.now()
            });
            document.getElementById('comInput').value = "";
        };

        function loadComments(id) {
            onValue(ref(db, `jogos/${id}/comments`), (snap) => {
                const list = document.getElementById('comment-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div style="margin-bottom:8px; border-bottom:1px solid #222; padding-bottom:5px">
                        <b style="color:var(--neon); font-size:11px">${d.user}:</b>
                        <span style="font-size:12px"> ${d.text}</span>
                    </div>`;
                });
            });
        }

        // --- NÍVEIS E XP ---
        async function updateProfile() {
            const snap = await get(ref(db, 'jogos'));
            let totalLikes = 0, totalViews = 0;
            snap.forEach(child => {
                const g = child.val();
                if(g.author === currentUser) {
                    if(g.likes) totalLikes += Object.keys(g.likes).length;
                    totalViews += (g.views || 0);
                }
            });

            const xp = (totalLikes * 10) + (totalViews * 2);
            const level = Math.floor(xp / 100) + 1;
            const progress = xp % 100;

            document.getElementById('p-likes').innerText = totalLikes;
            document.getElementById('p-visits').innerText = totalViews;
            document.getElementById('p-bar').style.width = progress + "%";
            document.getElementById('p-xp-text').innerText = `NV ${level} | ${progress}/100 XP`;
            
            const badge = document.getElementById('p-badge');
            if(level >= 10 || currentUser === "PlanetOfc") {
                badge.innerText = "LENDA DO HUB"; badge.className = "rank-badge rank-lenda";
            } else {
                badge.innerText = "DEV INICIANTE"; badge.className = "rank-badge rank-dev";
            }
        }

        window.showTab = (id, el) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active-container'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active-container');
            el.classList.add('active');
            if(id === 'perfil') updateProfile();
        };

        window.closeModal = (id) => {
            document.getElementById(id).style.display = "none";
            if(id === 'playerModal' && currentGameId) {
                remove(ref(db, `jogos/${currentGameId}/ccu/${currentUser}`));
                currentGameId = null;
            }
        };

        loadHub();
    </script>
</body>
</html>
