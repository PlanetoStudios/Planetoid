<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid | No-Storage Edition</title>
    <style>
        /* Mantendo o seu estilo galáctico */
        body { margin: 0; background-color: #050505; color: #f0f0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(100px 150px at 50% 50%, #1a0033, #050505); }
        header { padding: 30px; text-align: center; }
        h1 { font-size: 3rem; color: #00ffcc; text-shadow: 3px 3px #b800ff; margin: 0; }
        #auth-screen { display: flex; flex-direction: column; gap: 15px; width: 300px; margin-top: 50px; }
        #main-hub { display: none; width: 100%; flex-direction: column; align-items: center; }
        .controls { margin-bottom: 40px; display: flex; gap: 10px; }
        .btn { background: #b800ff; color: white; border: 4px solid #7a00aa; padding: 10px 15px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .btn:hover { background: #00ffcc; color: #000; border-color: #00ccaa; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 90%; max-width: 1200px; padding: 20px; }
        .game-card { background: #111; border: 3px solid #333; overflow: hidden; position: relative; transition: 0.3s; }
        .game-banner { width: 100%; height: 150px; object-fit: cover; background: #222; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 2% auto; padding: 30px; border: 5px solid #00ffcc; width: 90%; max-width: 600px; }
        input, textarea { width: 100%; padding: 12px; background: #000; color: #00ffcc; border: 2px solid #333; margin-bottom: 10px; box-sizing: border-box; }
        #imgPreview { width: 100%; height: 120px; object-fit: cover; border: 2px solid #333; display: none; margin-bottom: 10px; }
        #game-player { width: 100%; height: 500px; border: none; background: #fff; }
    </style>
</head>
<body>

    <header><h1>PLANETOID</h1></header>

    <div id="auth-screen">
        <input type="text" id="authUser" placeholder="Comandante">
        <input type="password" id="authPass" placeholder="Senha">
        <button class="btn" onclick="handleAuth('login')">ENTRAR</button>
        <button class="btn" style="background:#00d4ff" onclick="handleAuth('signup')">CRIAR CONTA</button>
        <p id="authMsg" style="color: #ff4757; text-align: center;"></p>
    </div>

    <div id="main-hub">
        <div class="controls">
            <button class="btn" onclick="prepareUpload()">[+] NOVO JOGO</button>
            <button class="btn" style="background:#ff4757" onclick="logout()">SAIR</button>
        </div>
        <div id="game-grid"></div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">LANÇAR JOGO</h2>
            <input type="hidden" id="editGameId">
            <input type="text" id="gameName" placeholder="Nome do Jogo">
            <label style="font-size: 0.7rem; color: #888;">CAPA DO DISPOSITIVO:</label>
            <input type="file" id="gameLogoFile" accept="image/*" onchange="processImage(this)">
            <img id="imgPreview">
            <textarea id="gameCode" placeholder="Código HTML" rows="5"></textarea>
            <button class="btn" id="saveBtn" onclick="saveGame()">GRAVAR NO BANCO</button>
            <button class="btn" style="background:#444" onclick="closeModal('uploadModal')">CANCELAR</button>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" style="max-width: 90%;">
            <span style="cursor:pointer; color:red; float:right" onclick="closeModal('playerModal')">[X]</span>
            <iframe id="game-player"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, child, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentBase64 = ""; // Aqui guardaremos o texto da imagem

        // --- AUTH ---
        window.handleAuth = async (type) => {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value;
            if(!user || !pass) return;
            const snap = await get(child(ref(db), 'usuarios/' + user));
            if(type === 'signup') {
                if(snap.exists()) { document.getElementById('authMsg').innerText = "Já existe!"; }
                else { await set(ref(db, 'usuarios/' + user), { password: pass }); loginSuccess(user); }
            } else {
                if(snap.exists() && snap.val().password === pass) loginSuccess(user);
                else document.getElementById('authMsg').innerText = "Erro!";
            }
        };

        function loginSuccess(u) {
            localStorage.setItem('planetoid_user', u);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-hub').style.display = 'flex';
            loadGames();
        }

        window.logout = () => { localStorage.removeItem('planetoid_user'); location.reload(); };
        if(localStorage.getItem('planetoid_user')) loginSuccess(localStorage.getItem('planetoid_user'));

        // --- LÓGICA DA IMAGEM (A MÁGICA) ---
        window.processImage = (input) => {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentBase64 = e.target.result; // Transforma a foto em texto!
                    const prev = document.getElementById('imgPreview');
                    prev.src = currentBase64;
                    prev.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // --- GAMES ---
        window.prepareUpload = () => {
            document.getElementById('editGameId').value = "";
            document.getElementById('gameName').value = "";
            document.getElementById('gameCode').value = "";
            document.getElementById('imgPreview').style.display = 'none';
            currentBase64 = "";
            openModal('uploadModal');
        };

        window.saveGame = async () => {
            const id = document.getElementById('editGameId').value;
            const name = document.getElementById('gameName').value;
            const code = document.getElementById('gameCode').value;
            const author = localStorage.getItem('planetoid_user');

            if(name && code) {
                const gameData = { 
                    name, 
                    logo: currentBase64 || "https://placehold.co/400x200/111/00ffcc?text=SEM+FOTO", 
                    code, 
                    author 
                };
                if(id) await set(ref(db, 'jogos/' + id), gameData);
                else await push(ref(db, 'jogos'), gameData);
                closeModal('uploadModal');
            }
        };

        function loadGames() {
            onValue(ref(db, 'jogos'), (snap) => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = "";
                const currentU = localStorage.getItem('planetoid_user');
                snap.forEach((childSnap) => {
                    const g = childSnap.val();
                    const id = childSnap.key;
                    const isOwner = g.author === currentU;
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img src="${g.logo}" class="game-banner">
                        <div style="padding:15px; text-align:center">
                            <h3>${g.name}</h3>
                            <button class="btn" onclick="playGame('${btoa(unescape(encodeURIComponent(g.code)))}')">JOGAR</button>
                            ${isOwner ? `<button class="btn" style="background:red" onclick="deleteGame('${id}')">X</button>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        window.deleteGame = (id) => { if(confirm("Apagar?")) remove(ref(db, 'jogos/' + id)); };
        window.playGame = (encoded) => {
            const code = decodeURIComponent(escape(atob(encoded)));
            openModal('playerModal');
            const d = document.getElementById('game-player').contentWindow.document;
            d.open(); d.write(code); d.close();
        };
        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => document.getElementById(id).style.display = "none";
    </script>
</body>
</html>
