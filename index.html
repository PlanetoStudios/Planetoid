<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid | Sistema de Contas</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0; background-color: #050505; color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(100px 150px at 50% 50%, #1a0033, #050505);
        }
        header { padding: 30px; text-align: center; }
        h1 { font-size: 3rem; color: #00ffcc; text-shadow: 3px 3px #b800ff; margin: 0; }
        
        /* TELAS */
        #auth-screen { display: flex; flex-direction: column; gap: 15px; width: 300px; margin-top: 50px; }
        #main-hub { display: none; width: 100%; flex-direction: column; align-items: center; }

        .controls { margin-bottom: 40px; display: flex; gap: 10px; }
        .btn {
            background: #b800ff; color: white; border: 4px solid #7a00aa;
            padding: 12px 20px; cursor: pointer; font-weight: bold; font-family: inherit;
        }
        .btn:hover { background: #00ffcc; color: #000; border-color: #00ccaa; }
        
        #game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 90%; max-width: 1100px; }
        .game-card { background: #111; border: 3px solid #333; padding: 20px; text-align: center; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 5% auto; padding: 30px; border: 5px solid #00ffcc; width: 90%; max-width: 600px; }
        
        input, textarea { width: 100%; padding: 12px; background: #000; color: #00ffcc; border: 2px solid #333; font-family: monospace; margin-bottom: 10px; box-sizing: border-box; }
        #game-player { width: 100%; height: 500px; border: 3px solid #333; background: #fff; }
        
        .user-info { margin-bottom: 20px; color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>PLANETOID</h1>
    </header>

    <div id="auth-screen">
        <h2 style="text-align: center; color: #b800ff;">IDENTIFIQUE-SE</h2>
        <input type="text" id="authUser" placeholder="Nome do Comandante">
        <input type="password" id="authPass" placeholder="Senha Estelar">
        <button class="btn" onclick="handleAuth('login')">ENTRAR NA NAVE</button>
        <button class="btn" style="background:#00d4ff; border-color:#008fb3; color:#000" onclick="handleAuth('signup')">CRIAR NOVA CONTA</button>
        <p id="authMsg" style="color: #ff4757; font-size: 0.8rem; text-align: center;"></p>
    </div>

    <div id="main-hub">
        <div class="user-info">Bem-vindo, Comandante <span id="displayUser">...</span>!</div>
        
        <div class="controls">
            <button class="btn" onclick="openModal('uploadModal')">[+] UPLOAD JOGO</button>
            <button class="btn" style="background:#ff4757" onclick="logout()">SAIR</button>
        </div>

        <div id="game-grid"></div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#00d4ff">LANÇAR JOGO</h2>
            <input type="text" id="gameName" placeholder="Nome do Jogo">
            <textarea id="gameCode" placeholder="Cole o código HTML aqui..."></textarea>
            <button class="btn" onclick="uploadGame()">ENVIAR PARA ÓRBITA</button>
            <button class="btn" style="background:#444" onclick="closeModal('uploadModal')">VOLTAR</button>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <span style="cursor:pointer; color:red; float:right" onclick="closeModal('playerModal')">[X]</span>
            <h2 id="currentPlayingTitle" style="color:#00ffcc; margin:0 0 10px 0;">...</h2>
            <iframe id="game-player"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const usersRef = ref(db, 'usuarios');
        const gamesRef = ref(db, 'jogos');

        // --- SISTEMA DE AUTENTICAÇÃO ---
        window.handleAuth = async (type) => {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value;
            const msg = document.getElementById('authMsg');

            if (!user || !pass) { msg.innerText = "Preencha todos os campos!"; return; }

            const snapshot = await get(child(usersRef, user));
            
            if (type === 'signup') {
                if (snapshot.exists()) {
                    msg.innerText = "Erro: Nome de comandante já em uso!";
                } else {
                    await push(ref(db, 'usuarios/' + user), { password: pass });
                    msg.style.color = "#00ffcc";
                    msg.innerText = "Conta criada! Agora clique em ENTRAR.";
                }
            } else {
                if (snapshot.exists()) {
                    // O Firebase retorna um objeto com chaves aleatórias se usar push, 
                    // para simplificar, vamos verificar o primeiro valor
                    const userData = Object.values(snapshot.val())[0];
                    if (userData.password === pass) {
                        loginSuccess(user);
                    } else {
                        msg.innerText = "Senha incorreta!";
                    }
                } else {
                    msg.innerText = "Comandante não encontrado!";
                }
            }
        };

        function loginSuccess(username) {
            localStorage.setItem('planetoid_session', username);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-hub').style.display = 'flex';
            document.getElementById('displayUser').innerText = username.toUpperCase();
            loadGames();
        }

        window.logout = () => {
            localStorage.removeItem('planetoid_session');
            location.reload();
        };

        // Verifica sessão ao carregar
        const savedSession = localStorage.getItem('planetoid_session');
        if (savedSession) loginSuccess(savedSession);

        // --- SISTEMA DE JOGOS ---
        window.uploadGame = async () => {
            const name = document.getElementById('gameName').value;
            const code = document.getElementById('gameCode').value;
            const author = localStorage.getItem('planetoid_session');

            if(name && code) {
                await push(gamesRef, { name, code, author, timestamp: Date.now() });
                closeModal('uploadModal');
            }
        };

        function loadGames() {
            onValue(gamesRef, (snapshot) => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.keys(data).reverse().forEach(key => {
                        const game = data[key];
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        card.innerHTML = `
                            <div style="font-size: 30px;">🎮</div>
                            <h3>${game.name}</h3>
                            <p style="font-size:0.7rem; color:#888">Por: ${game.author}</p>
                            <button class="btn" onclick="playGame('${btoa(unescape(encodeURIComponent(game.code)))}', '${game.name}')">JOGAR</button>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        window.playGame = (encodedCode, name) => {
            const code = decodeURIComponent(escape(atob(encodedCode)));
            const player = document.getElementById('game-player');
            document.getElementById('currentPlayingTitle').innerText = name;
            openModal('playerModal');
            const doc = player.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
        };

        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => {
            document.getElementById(id).style.display = "none";
            if(id === 'playerModal') document.getElementById('game-player').src = "about:blank";
        };
    </script>
</body>
</html>
