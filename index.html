<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid | Overdrive Engin</title>
    <style>
        :root { --neon: #00ffcc; --purple: #b800ff; --bg: #050505; --card: #111; }
        body {
            margin: 0; background: var(--bg); color: #f0f0f0;
            font-family: 'Courier New', monospace; min-height: 100vh;
            background-image: radial-gradient(1px 1px at 20px 30px, #333, rgba(0,0,0,0));
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* INTERFACE */
        .btn { background: var(--purple); color: white; border: 3px solid #7a00aa; padding: 10px 15px; cursor: pointer; font-weight: bold; font-family: inherit; margin: 2px; transition: 0.2s; }
        .btn:hover { background: var(--neon); color: #000; border-color: #00ccaa; box-shadow: 0 0 10px var(--neon); }
        input, textarea, select { background: #000; color: var(--neon); border: 1px solid #333; padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box; }

        /* GRID */
        #game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 95%; max-width: 1200px; padding: 20px; }
        .game-card { background: var(--card); border: 2px solid #222; border-radius: 10px; overflow: hidden; position: relative; }
        .update-badge { position: absolute; top: 10px; left: 10px; background: gold; color: black; font-size: 0.6rem; padding: 2px 5px; font-weight: bold; border-radius: 3px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* EDITOR E ASSETS */
        .file-entry { background: #151515; padding: 15px; border-left: 5px solid var(--purple); margin-bottom: 15px; }
        .asset-item { background: #222; padding: 5px; margin: 5px 0; font-size: 0.7rem; display: flex; justify-content: space-between; align-items: center; border: 1px dashed #444; }
        
        /* DEBUG CONSOLE */
        #debug-console { background: #000; color: #0f0; height: 100px; overflow-y: auto; font-size: 0.8rem; padding: 10px; border: 2px solid #333; margin-top: 10px; text-align: left; }

        /* MODAIS */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 1% auto; padding: 25px; border: 2px solid var(--neon); width: 90%; max-width: 900px; }
        
        iframe { width: 100%; height: 65vh; background: #fff; border: none; }
        .tag-pill { background: #333; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; color: var(--neon); }
    </style>
</head>
<body>

    <header><h1>PLANETOID v12</h1></header>

    <div id="auth-screen" style="width:300px; text-align:center;">
        <input type="text" id="authUser" placeholder="USUÁRIO">
        <input type="password" id="authPass" placeholder="SENHA">
        <button class="btn" style="width:100%" onclick="handleAuth('login')">INICIAR SESSÃO</button>
        <button class="btn" style="width:100%; background:#444" onclick="handleAuth('signup')">RECRUTAR</button>
    </div>

    <div id="main-hub" style="display:none; width:100%; text-align:center;">
        <div style="padding: 10px; background: #111; margin-bottom: 20px;">
            <span id="myName">...</span> | 
            <button class="btn" style="background:red" onclick="logout()">X</button>
        </div>
        
        <button class="btn" onclick="prepareUpload()">[+] CRIAR NOVO PROJETO</button>
        <div id="game-grid"></div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon)">CONSTRUTOR DE GALÁXIAS</h2>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
                <div>
                    <input type="text" id="gameName" placeholder="Título do Projeto">
                    <select id="gameTag">
                        <option value="Ação">Gênero: Ação</option>
                        <option value="Terror">Gênero: Terror</option>
                        <option value="Plataforma">Gênero: Plataforma</option>
                        <option value="Clicker">Gênero: Clicker</option>
                    </select>
                    <div id="files-container" style="margin-top:15px"></div>
                    <button class="btn" onclick="addFileField()">+ ARQUIVO</button>
                </div>

                <div style="background:#111; padding:15px; border:1px solid #333;">
                    <h4 style="margin:0; color:var(--purple)">BIBLIOTECA DE MÍDIA</h4>
                    <p style="font-size:0.6rem; color:#888;">Imagens/Sons viram variáveis JS</p>
                    <input type="file" id="assetInput" accept="image/*,audio/*" onchange="uploadAsset()" style="font-size:0.7rem">
                    <div id="asset-list" style="margin-top:10px;"></div>
                </div>
            </div>

            <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
                <input type="hidden" id="editGameId">
                <button class="btn" id="saveBtn" onclick="saveGame()">PUBLICAR NA ÓRBITA</button>
                <button class="btn" style="background:#444" onclick="closeModal('uploadModal')">FECHAR</button>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" style="max-width:98%">
            <button class="btn" style="float:right; background:red" onclick="closeModal('playerModal')">X</button>
            <h2 id="playTitle" style="margin:0; text-align:left"></h2>
            <iframe id="player-frame"></iframe>
            <div id="debug-console">Iniciando terminal de depuração...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, child, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.tempAssets = {}; // Guarda assets temporários do editor

        // --- AUTH ---
        window.handleAuth = async (type) => {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value;
            if(!user || !pass) return;
            const snap = await get(child(ref(db), 'usuarios/' + user));
            if(type === 'signup'){
                await set(ref(db, 'usuarios/' + user), { password: pass }); loginSuccess(user);
            } else if(snap.exists() && snap.val().password === pass) loginSuccess(user);
            else alert("Erro no acesso!");
        };

        function loginSuccess(u){
            localStorage.setItem('planetoid_user', u);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-hub').style.display = 'flex';
            document.getElementById('myName').innerText = "CMD: " + u.toUpperCase();
            loadGames();
        }
        window.logout = () => { localStorage.removeItem('planetoid_user'); location.reload(); };

        // --- GESTÃO DE ASSETS (MÍDIA) ---
        window.uploadAsset = () => {
            const file = document.getElementById('assetInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const name = "ASSET_" + Math.floor(Math.random() * 999);
                window.tempAssets[name] = e.target.result;
                renderAssetList();
            };
            reader.readAsDataURL(file);
        };

        function renderAssetList(){
            const list = document.getElementById('asset-list');
            list.innerHTML = "";
            for(let key in window.tempAssets){
                list.innerHTML += `<div class="asset-item">
                    <span>${key}</span>
                    <button class="btn" style="padding:2px; font-size:0.5rem" onclick="navigator.clipboard.writeText('window.${key}')">COPIAR VAR</button>
                </div>`;
            }
        }

        // --- EDITOR ---
        window.addFileField = (name = "script.js", content = "") => {
            const container = document.getElementById('files-container');
            const div = document.createElement('div');
            div.className = 'file-entry';
            div.innerHTML = `
                <div style="display:flex; gap:5px; margin-bottom:5px">
                    <input type="text" class="f-name" value="${name}" style="height:30px">
                    <button class="btn" style="background:red; padding:0 10px" onclick="this.parentElement.parentElement.remove()">X</button>
                </div>
                <textarea rows="6" class="f-content">${content}</textarea>
            `;
            container.appendChild(div);
        };

        window.saveGame = async () => {
            const id = document.getElementById('editGameId').value;
            const name = document.getElementById('gameName').value.trim();
            const tag = document.getElementById('gameTag').value;
            const author = localStorage.getItem('planetoid_user');
            
            const files = [];
            document.querySelectorAll('.file-entry').forEach(el => {
                files.push({ name: el.querySelector('.f-name').value, content: el.querySelector('.f-content').value });
            });

            const gameData = { name, tag, files, assets: window.tempAssets, author, lastUpdate: Date.now() };

            if(id) await update(ref(db, 'jogos/' + id), gameData);
            else { gameData.likes = 0; await push(ref(db, 'jogos'), gameData); }
            
            closeModal('uploadModal');
        };

        // --- PLAYER COM DEBUG ---
        window.playGame = async (id) => {
            const s = await get(ref(db, 'jogos/' + id));
            const g = s.val();
            document.getElementById('playTitle').innerText = g.name;
            document.getElementById('debug-console').innerHTML = "> Inicializando sistema...";
            openModal('playerModal');

            // Injeta Assets no Window do iframe
            let assetScript = "<script>";
            if(g.assets) {
                for(let key in g.assets) { assetScript += `window.${key} = "${g.assets[key]}";\n`; }
            }
            // Captura erros do console do iframe
            assetScript += `
                window.onerror = (m, u, l) => parent.postMessage({type:'err', msg: m + ' na linha ' + l}, '*');
                console.log = (m) => parent.postMessage({type:'log', msg: m}, '*');
                <\/script>
            `;

            let html = "", css = "", js = "";
            g.files.forEach(f => {
                if(f.name.endsWith('.html')) html += f.content;
                else if(f.name.endsWith('.css')) css += `<style>${f.content}</style>`;
                else if(f.name.endsWith('.js')) js += `<script>${f.content}<\/script>`;
            });

            const finalCode = assetScript + css + (html || "<body></body>") + js;
            const d = document.getElementById('player-frame').contentWindow.document;
            d.open(); d.write(finalCode); d.close();
        };

        // Escuta logs do iframe
        window.addEventListener('message', (e) => {
            const consoleEl = document.getElementById('debug-console');
            if(e.data.type === 'err') consoleEl.innerHTML += `<div style="color:red">> ERRO: ${e.data.msg}</div>`;
            if(e.data.type === 'log') consoleEl.innerHTML += `<div style="color:#0f0">> LOG: ${e.data.msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        });

        function loadGames() {
            onValue(ref(db, 'jogos'), (s) => {
                const grid = document.getElementById('game-grid'); grid.innerHTML = "";
                s.forEach(c => {
                    const g = c.val();
                    const isNew = (Date.now() - g.lastUpdate) < 86400000; // Menos de 24h
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        ${isNew ? '<div class="update-badge">NEW UPDATE</div>' : ''}
                        <div style="padding:20px">
                            <span class="tag-pill">${g.tag}</span>
                            <h3>${g.name}</h3>
                            <button class="btn" style="width:100%" onclick="playGame('${c.key}')">ABRIR</button>
                            ${(g.author === localStorage.getItem('planetoid_user') || localStorage.getItem('planetoid_user') === 'planetofc') ? 
                            `<button class="btn" style="background:#333; width:100%" onclick="editGame('${c.key}')">EDITAR</button>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        window.editGame = async (id) => {
            const s = await get(ref(db, 'jogos/' + id));
            const g = s.val();
            document.getElementById('editGameId').value = id;
            document.getElementById('gameName').value = g.name;
            document.getElementById('gameTag').value = g.tag;
            window.tempAssets = g.assets || {};
            renderAssetList();
            document.getElementById('files-container').innerHTML = "";
            g.files.forEach(f => addFileField(f.name, f.content));
            openModal('uploadModal');
        };

        window.prepareUpload = () => {
            document.getElementById('editGameId').value = "";
            document.getElementById('files-container').innerHTML = "";
            window.tempAssets = {};
            renderAssetList();
            addFileField("index.html", "<h1>Olá Mundo</h1>");
            openModal('uploadModal');
        };

        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => { 
            document.getElementById(id).style.display = "none";
            if(id === 'playerModal') document.getElementById('player-frame').src = "about:blank";
        };

        if(localStorage.getItem('planetoid_user')) loginSuccess(localStorage.getItem('planetoid_user'));
    </script>
</body>
</html>
