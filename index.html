<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid | Realtime Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffcc">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body {
            margin: 0; background-color: #050505; color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(1px 1px at 100px 150px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
        }
        header { padding: 40px; text-align: center; }
        h1 { font-size: 3rem; color: #00ffcc; text-shadow: 3px 3px #b800ff; margin: 0; }
        .controls { margin-bottom: 40px; display: flex; gap: 15px; }
        .btn {
            background: #b800ff; color: white; border: 4px solid #7a00aa;
            padding: 12px 20px; cursor: pointer; font-weight: bold; font-family: inherit;
        }
        .btn:hover { background: #00ffcc; color: #000; border-color: #00ccaa; }
        .btn-upload { background: #00d4ff; border-color: #008fb3; color: #000; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 90%; max-width: 1100px; }
        .game-card { background: #111; border: 3px solid #333; padding: 25px; text-align: center; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 5% auto; padding: 30px; border: 5px solid #00ffcc; width: 90%; max-width: 700px; }
        input, textarea { width: 100%; padding: 12px; background: #000; color: #00ffcc; border: 2px solid #333; font-family: monospace; margin-bottom: 15px; box-sizing: border-box; }
        #game-player { width: 100%; height: 500px; border: 3px solid #333; background: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>PLANETOID</h1>
        <p style="color: #b800ff;">📡 Rede Galáctica de Jogos</p>
    </header>

    <div class="controls">
        <button class="btn btn-upload" onclick="openModal('uploadModal')">[+] UPLOAD JOGO</button>
        <button class="btn" onclick="openModal('helpModal')">[?] INFO</button>
    </div>

    <div id="game-grid">
        <p>Sincronizando com a base...</p>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#00d4ff">NOVA MISSÃO</h2>
            <input type="text" id="gameName" placeholder="Nome do Jogo">
            <textarea id="gameCode" placeholder="Cole o código HTML aqui..."></textarea>
            <button class="btn" id="btnLancar" onclick="uploadGame()">LANÇAR AO ESPAÇO</button>
            <button class="btn" style="background:#ff4757" onclick="closeModal('uploadModal')">CANCELAR</button>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <span style="cursor:pointer; color:red; float:right" onclick="closeModal('playerModal')">[FECHAR X]</span>
            <h2 id="currentPlayingTitle" style="color:#00ffcc; margin:0 0 10px 0;">Executando...</h2>
            <iframe id="game-player"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gamesRef = ref(db, 'jogos');

        window.uploadGame = async () => {
            const name = document.getElementById('gameName').value;
            const code = document.getElementById('gameCode').value;
            if(name && code) {
                try {
                    await push(gamesRef, { name: name, code: code, timestamp: Date.now() });
                    closeModal('uploadModal');
                } catch (e) { alert("Erro: " + e); }
            }
        };

        onValue(gamesRef, (snapshot) => {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const game = data[key];
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <div style="font-size: 40px;">👾</div>
                        <h3>${game.name}</h3>
                        <button class="btn" onclick="playGame('${btoa(unescape(encodeURIComponent(game.code)))}', '${game.name}')">COMEÇAR JOGO</button>
                    `;
                    grid.appendChild(card);
                });
            } else { grid.innerHTML = "<p>Nenhum jogo encontrado.</p>"; }
        });

        window.playGame = (encodedCode, name) => {
            const code = decodeURIComponent(escape(atob(encodedCode)));
            const player = document.getElementById('game-player');
            document.getElementById('currentPlayingTitle').innerText = name;
            openModal('playerModal');
            const doc = player.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        };

        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => {
            document.getElementById(id).style.display = "none";
            if(id === 'playerModal') document.getElementById('game-player').src = "about:blank";
        };

        // REGISTRO DO SERVICE WORKER PARA PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Planetoid: Sistema Offline Ativo"))
            .catch(err => console.log("Erro SW:", err));
        }
    </script>
</body>
</html>
