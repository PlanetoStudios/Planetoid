<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid Studio | v16.1</title>

    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/lq3tNk9.jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/lq3tNk9.jpeg">
    
    <style>
        :root { 
            --neon: #00ffcc; --purple: #b800ff; --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05); --red: #ff3333;
        }
        
        body { 
            margin: 0; background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%);
            background-attachment: fixed; color: #f0f0f0; 
            font-family: 'Segoe UI', sans-serif; text-align: center; min-height: 100vh;
        }

        .nav-bar { display: flex; justify-content: center; gap: 20px; background: rgba(0,0,0,0.7); padding: 15px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid var(--purple); }
        .nav-item { cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .btn { background: var(--purple); color: white; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; margin: 5px; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon); background: var(--neon); color: #000; }
        .btn-group { background: transparent; border: 2px solid var(--neon); color: var(--neon); }

        .container { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .active-container { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #game-grid, #asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; backdrop-filter: blur(10px); }
        .game-banner { width: 100%; height: 150px; object-fit: cover; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 2% auto; padding: 25px; border: 1px solid var(--purple); width: 90%; max-width: 800px; border-radius: 15px; }
        
        #debug-console { background: #000; color: var(--red); font-family: monospace; font-size: 11px; padding: 10px; border-top: 2px solid #222; text-align: left; max-height: 100px; overflow-y: auto; display: none; }

        input, textarea, select { background: #000; color: var(--neon); border: 1px solid #333; padding: 12px; width: 95%; margin-bottom: 10px; border-radius: 8px; }
        .file-entry { background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--purple); text-align: left; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('hub', this)">GAMES</div>
        <div class="nav-item" onclick="showTab('assets', this)">BIBLIOTECA</div>
        <div class="nav-item" onclick="showTab('perfil', this)">PERFIL</div>
    </div>

    <div id="hub" class="container active-container">
        <div style="margin: 30px 0;">
            <img src="https://i.imgur.com/lq3tNk9.jpeg" style="height: 80px; border-radius: 15px;">
            <h1 style="color:var(--neon)">PLANETOID STUDIO</h1>
            <button class="btn" onclick="prepareUpload()">[+] CRIAR PROJETO</button>
            <button class="btn btn-group" onclick="openModal('groupModal')">ESTÚDIOS</button>
        </div>
        <div id="game-grid"></div>
    </div>

    <div id="assets" class="container">
        <h2 style="color:var(--neon)">BIBLIOTECA DE SCRIPTS</h2>
        <div id="asset-grid"></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <button class="btn" style="float:right; background:var(--red)" onclick="closeModal('playerModal')">X</button>
            <h3 id="playTitle" style="color:var(--neon)"></h3>
            <iframe id="player-frame" style="width:100%; height:60vh; background:#fff; border-radius:8px;"></iframe>
            <div id="debug-console"></div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon)">EDITOR DE CÓDIGO</h2>
            <input type="text" id="gameName" placeholder="Título do Jogo">
            <select id="gameOwnerType"></select>
            <input type="file" id="gameImgInput" onchange="optimizeImg(this)" style="font-size: 10px;">
            <div id="files-container" style="margin: 20px 0;"></div>
            <button class="btn btn-group" onclick="addFileField()">+ ADICIONAR ARQUIVO</button>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <input type="hidden" id="editGameId">
            <button class="btn" style="background:#00c853" onclick="saveGame()">PUBLICAR NO HUB</button>
            <button class="btn" style="background:#444" onclick="saveDraft()">SALVAR NO IPAD</button>
            <button class="btn" style="background:transparent" onclick="closeModal('uploadModal')">FECHAR</button>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon)">ESTÚDIOS EM GRUPO</h2>
            <div id="group-list" style="text-align:left; margin-bottom: 20px;"></div>
            <input type="text" id="newGroupName" placeholder="Nome do Estúdio">
            <button class="btn" onclick="createGroup()">FUNDAR ESTÚDIO</button>
            <button class="btn btn-group" onclick="closeModal('groupModal')">VOLTAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const currentUser = "PlanetOfc";

        // --- SISTEMA DE ARQUIVOS (ADD FILE) ---
        window.addFileField = (name = "index.html", content = "") => {
            const div = document.createElement('div');
            div.className = 'file-entry';
            div.innerHTML = `
                <input type="text" class="f-name" value="${name}" style="width:50%">
                <button class="btn" style="background:red; padding:5px 10px; font-size:10px" onclick="this.parentElement.remove()">REMOVER</button>
                <textarea class="f-content" placeholder="Código aqui..." style="height:150px; margin-top:10px">${content}</textarea>
            `;
            document.getElementById('files-container').appendChild(div);
        };

        // --- SALVAR JOGO (FIREBASE) ---
        window.saveGame = async () => {
            const id = document.getElementById('editGameId').value;
            const name = document.getElementById('gameName').value;
            const owner = document.getElementById('gameOwnerType').value;
            
            const files = [];
            document.querySelectorAll('.file-entry').forEach(el => {
                files.push({
                    name: el.querySelector('.f-name').value,
                    content: el.querySelector('.f-content').value
                });
            });

            const data = {
                name, files,
                logo: window.currentImg || "",
                author: currentUser,
                groupId: owner === 'personal' ? null : owner,
                updatedAt: Date.now()
            };

            if(id) await update(ref(db, 'jogos/' + id), data);
            else await push(ref(db, 'jogos'), data);
            
            closeModal('uploadModal');
            alert("Publicado com sucesso!");
        };

        // --- GRUPOS ---
        window.createGroup = async () => {
            const name = document.getElementById('newGroupName').value;
            if(!name) return;
            await push(ref(db, 'grupos'), {
                nome: name,
                membros: { [currentUser.toLowerCase()]: true }
            });
            document.getElementById('newGroupName').value = "";
            loadMyGroups();
        };

        async function loadMyGroups() {
            const snap = await get(ref(db, 'grupos'));
            const list = document.getElementById('group-list');
            const sel = document.getElementById('gameOwnerType');
            list.innerHTML = "";
            sel.innerHTML = '<option value="personal">Pessoal (Sempre Eu)</option>';
            
            snap.forEach(g => {
                const d = g.val();
                if(d.membros && d.membros[currentUser.toLowerCase()]) {
                    list.innerHTML += `<div style="padding:10px; background:#111; border-radius:8px; margin-bottom:5px;">🚀 ${d.nome}</div>`;
                    sel.innerHTML += `<option value="${g.key}">${d.nome}</option>`;
                }
            });
        }

        // --- FUNÇÕES DE INTERFACE ---
        window.showTab = (id, el) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active-container'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active-container');
            el.classList.add('active');
        };

        window.openModal = (id) => {
            if(id === 'uploadModal' || id === 'groupModal') loadMyGroups();
            document.getElementById(id).style.display = "block";
        };

        window.closeModal = (id) => document.getElementById(id).style.display = "none";

        window.prepareUpload = () => {
            document.getElementById('editGameId').value = "";
            document.getElementById('gameName').value = "";
            document.getElementById('files-container').innerHTML = "";
            window.addFileField(); // Começa com um arquivo index.html
            openModal('uploadModal');
        };

        // --- CARREGAR HUB ---
        function loadGames() {
            onValue(ref(db, 'jogos'), (snap) => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const g = child.val();
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${g.logo || 'https://i.imgur.com/nfcjTXC.png'}" class="game-banner">
                            <div style="padding:15px">
                                <h3 style="margin:0 0 10px 0; color:var(--neon)">${g.name}</h3>
                                <button class="btn" style="width:100%" onclick="window.playGame('${child.key}')">JOGAR</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- OTIMIZAR IMAGEM ---
        window.optimizeImg = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; canvas.height = 350;
                    canvas.getContext('2d').drawImage(img, 0, 0, 600, 350);
                    window.currentImg = canvas.toDataURL('image/jpeg', 0.7);
                };
            };
            reader.readAsDataURL(input.files[0]);
        };

        loadGames();
    </script>
</body>
</html>
