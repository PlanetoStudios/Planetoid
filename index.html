<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid Studio | v16.5 Ultimate</title>

    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/lq3tNk9.jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/lq3tNk9.jpeg">
    
    <style>
        :root { 
            --neon: #00ffcc; --purple: #b800ff; --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05); --red: #ff3333; --gold: #ffd700;
        }
        
        body { 
            margin: 0; background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%);
            background-attachment: fixed; color: #f0f0f0; 
            font-family: 'Segoe UI', sans-serif; text-align: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- TELAS --- */
        #auth-screen { padding: 50px 20px; }
        #main-hub { display: none; }

        /* --- NAVEGAÇÃO --- */
        .nav-bar { display: flex; justify-content: center; gap: 15px; background: rgba(0,0,0,0.8); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--purple); backdrop-filter: blur(10px); }
        .nav-item { cursor: pointer; font-weight: bold; color: #666; font-size: 0.75rem; text-transform: uppercase; transition: 0.3s; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* --- BOTÕES --- */
        .btn { background: var(--purple); color: white; border: none; padding: 10px 18px; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 5px; transition: 0.3s; font-size: 13px; }
        .btn:hover { transform: scale(1.05); background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-outline { background: transparent; border: 1px solid var(--neon); color: var(--neon); }

        /* --- CONTAINERS --- */
        .container { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .active-container { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS --- */
        #game-grid, #asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; padding: 10px; }
        .card { background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; backdrop-filter: blur(10px); position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--neon); }
        .game-banner { width: 100%; height: 150px; object-fit: cover; background: #111; }

        /* --- STATS BAR --- */
        .stats-bar { display: flex; justify-content: space-around; padding: 8px; background: rgba(0,0,0,0.4); font-size: 10px; color: #aaa; border-top: 1px solid #222; }
        .online-dot { width: 7px; height: 7px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 4px; box-shadow: 0 0 5px #00ff00; }

        /* --- MODAIS --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 3% auto; padding: 25px; width: 90%; max-width: 700px; border-radius: 15px; border: 1px solid var(--purple); text-align: left; }
        
        input, textarea, select { background: #000; color: var(--neon); border: 1px solid #333; padding: 12px; width: 95%; margin-bottom: 12px; border-radius: 8px; font-family: monospace; }
        .file-entry { background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--purple); border-radius: 4px; }
        
        /* --- PERFIL --- */
        .rank-badge { font-size: 10px; padding: 4px 10px; border-radius: 5px; font-weight: bold; border: 1px solid; margin-bottom: 10px; display: inline-block; }
        .rank-lenda { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <img src="https://i.imgur.com/lq3tNk9.jpeg" style="height: 120px; border-radius: 20px; box-shadow: 0 0 20px var(--purple);">
        <h1 style="color:var(--neon); letter-spacing: 2px;">PLANETOID STUDIO</h1>
        <p style="color:#777">Desenvolva, jogue e compartilhe.</p>
        <input type="text" id="user-input" placeholder="Seu Username..." style="max-width: 300px; text-align: center;">
        <br>
        <button class="btn" onclick="login()">ENTRAR NO HUB</button>
    </div>

    <div id="main-hub">
        <div class="nav-bar">
            <div class="nav-item active" onclick="showTab('hub', this)">GAMES</div>
            <div class="nav-item" onclick="showTab('assets', this)">BIBLIOTECA</div>
            <div class="nav-item" onclick="showTab('perfil', this)">PERFIL</div>
        </div>

        <div id="hub" class="container active-container">
            <div style="margin-bottom: 20px;">
                <button class="btn" onclick="prepareUpload()">[+] NOVO PROJETO</button>
                <button class="btn btn-outline" onclick="openModal('groupModal')">ESTÚDIOS</button>
            </div>
            <div id="game-grid"></div>
        </div>

        <div id="assets" class="container">
            <h2 style="color:var(--neon)">SCRIPTS & ASSETS</h2>
            <button class="btn" onclick="openModal('assetModal')">+ POSTAR SCRIPT</button>
            <div id="asset-grid"></div>
        </div>

        <div id="perfil" class="container">
            <div class="card" style="max-width: 450px; margin: 0 auto; padding: 30px;">
                <div id="p-rank" class="rank-badge">DEV</div>
                <h2 id="p-name" style="color:var(--neon); margin: 5px 0;"></h2>
                <div id="p-stats" style="text-align: left; font-size: 14px; margin-top: 20px;">
                    <p>❤️ Curtidas Recebidas: <span id="p-likes" style="color:var(--purple)">0</span></p>
                    <p>👁️ Visitas Totais: <span id="p-views" style="color:var(--purple)">0</span></p>
                    <p>👥 Seguidores: <span id="p-follows" style="color:var(--purple)">0</span></p>
                    <div style="background:#222; height:10px; border-radius:10px; margin-top:10px;">
                        <div id="p-bar" style="width:0%; background:var(--neon); height:100%; border-radius:10px; transition: 1s;"></div>
                    </div>
                </div>
                <button class="btn" style="background:var(--red); margin-top: 30px;" onclick="location.reload()">SAIR / LOGOUT</button>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <button class="btn" style="float:right; background:var(--red)" onclick="closeModal('playerModal')">FECHAR</button>
            <h3 id="playTitle" style="color:var(--neon)"></h3>
            <iframe id="player-frame" style="width:100%; height:55vh; background:#fff; border-radius:8px;"></iframe>
            
            <div style="margin-top: 15px; border-top: 1px solid #222; padding-top: 15px;">
                <button class="btn btn-outline" id="followBtn">SEGUIR AUTOR</button>
                <h4 style="color:var(--purple)">COMENTÁRIOS</h4>
                <div id="comment-list" style="max-height: 120px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px;"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="comInput" placeholder="Diga algo..." style="margin:0">
                    <button class="btn" onclick="postComment()">ENVIAR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon)">EDITOR DE CÓDIGO</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="g-name" placeholder="Título do Jogo">
            <select id="g-owner"><option value="personal">Pessoal</option></select>
            <div id="files-list"></div>
            <button class="btn btn-outline" onclick="addFile()">+ NOVO ARQUIVO</button>
            <hr style="border:0; border-top:1px solid #222; margin: 20px 0;">
            <button class="btn" style="background:#00c853" onclick="saveGame()">PUBLICAR AGORA</button>
            <button class="btn" style="background:#444" onclick="closeModal('uploadModal')">DESCARTAR</button>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h2>ESTÚDIOS</h2>
            <div id="g-list-display"></div>
            <input type="text" id="new-group-name" placeholder="Nome do Estúdio...">
            <button class="btn" onclick="createGroup()">CRIAR ESTÚDIO</button>
            <button class="btn btn-outline" onclick="closeModal('groupModal')">VOLTAR</button>
        </div>
    </div>

    <div id="assetModal" class="modal">
        <div class="modal-content">
            <h2>POSTAR SCRIPT</h2>
            <input type="text" id="asset-name" placeholder="Ex: Script de Pulo">
            <textarea id="asset-code" style="height: 200px;" placeholder="Cole seu código aqui..."></textarea>
            <button class="btn" onclick="saveAsset()">POSTAR</button>
            <button class="btn btn-outline" onclick="closeModal('assetModal')">CANCELAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, update, remove, onDisconnect, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let user = "";
        let currentGameId = null;

        // --- AUTH & LOGIN ---
        window.login = () => {
            user = document.getElementById('user-input').value.trim();
            if(!user) return alert("Escolha um nome!");
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('main-hub').style.display = "block";
            document.getElementById('p-name').innerText = user;
            loadHub();
            loadAssets();
            loadGroups();
        };

        // --- NAVEGAÇÃO ---
        window.showTab = (id, el) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active-container'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active-container');
            el.classList.add('active');
            if(id === 'perfil') loadProfileStats();
        };

        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => {
            document.getElementById(id).style.display = "none";
            if(id === 'playerModal' && currentGameId) {
                remove(ref(db, `jogos/${currentGameId}/ccu/${user}`));
                currentGameId = null;
            }
        };

        // --- LÓGICA DE GAMES ---
        window.addFile = (n = "index.html", c = "") => {
            const div = document.createElement('div');
            div.className = 'file-entry';
            div.innerHTML = `<input type="text" class="f-n" value="${n}" style="width:40%"><button class="btn" style="background:red; padding:5px" onclick="this.parentElement.remove()">X</button><textarea class="f-c" style="height:100px; margin-top:10px">${c}</textarea>`;
            document.getElementById('files-list').appendChild(div);
        };

        window.prepareUpload = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('g-name').value = "";
            document.getElementById('files-list').innerHTML = "";
            window.addFile();
            openModal('uploadModal');
        };

        window.saveGame = async () => {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('g-name').value;
            const files = [];
            document.querySelectorAll('.file-entry').forEach(e => {
                files.push({ name: e.querySelector('.f-n').value, content: e.querySelector('.f-c').value });
            });
            const data = { name, files, author: user, updatedAt: Date.now() };
            if(id) await update(ref(db, 'jogos/' + id), data);
            else await push(ref(db, 'jogos'), data);
            closeModal('uploadModal');
        };

        function loadHub() {
            onValue(ref(db, 'jogos'), (snap) => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = "";
                snap.forEach(c => {
                    const id = c.key; const g = c.val();
                    const likes = g.likes ? Object.keys(g.likes).length : 0;
                    const ccu = g.ccu ? Object.keys(g.ccu).length : 0;
                    const views = g.views || 0;
                    const isOwner = (g.author === user || user === "PlanetOfc");

                    grid.innerHTML += `
                        <div class="card">
                            <img src="https://i.imgur.com/nfcjTXC.png" class="game-banner">
                            <div style="padding:15px">
                                <h3 style="margin:0; color:var(--neon)">${g.name}</h3>
                                <p style="font-size:10px; color:#666">DEV: ${g.author}</p>
                                <div class="stats-bar">
                                    <span>❤️ ${likes}</span> <span>👁️ ${views}</span> <span><div class="online-dot"></div> CCU: ${ccu}</span>
                                </div>
                                <div style="margin-top:10px">
                                    <button class="btn" style="width:100%" onclick="playGame('${id}')">JOGAR</button>
                                    <button class="btn btn-outline" style="width:45%" onclick="likeGame('${id}')">LIKE</button>
                                    ${isOwner ? `<button class="btn" style="width:45%; background:orange" onclick="editGame('${id}')">EDIT</button>` : ''}
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        window.playGame = async (id) => {
            currentGameId = id;
            const s = await get(ref(db, `jogos/${id}`));
            const g = s.val();
            update(ref(db, `jogos/${id}`), { views: increment(1) });
            const ccuRef = ref(db, `jogos/${id}/ccu/${user}`);
            set(ccuRef, true); onDisconnect(ccuRef).remove();

            document.getElementById('playTitle').innerText = g.name;
            openModal('playerModal');
            
            const frame = document.getElementById('player-frame');
            const doc = frame.contentWindow.document;
            let h="", c="", j="";
            g.files.forEach(f => {
                if(f.name.endsWith('.html')) h+=f.content;
                else if(f.name.endsWith('.css')) c+=`<style>${f.content}</style>`;
                else if(f.name.endsWith('.js')) j+=f.content;
            });
            doc.open(); doc.write(`<html><head>${c}</head><body>${h}<script>${j}<\/script></body></html>`); doc.close();
            loadComments(id);
        };

        window.likeGame = (id) => set(ref(db, `jogos/${id}/likes/${user}`), true);

        window.editGame = async (id) => {
            const s = await get(ref(db, 'jogos/' + id));
            const g = s.val();
            document.getElementById('edit-id').value = id;
            document.getElementById('g-name').value = g.name;
            document.getElementById('files-list').innerHTML = "";
            g.files.forEach(f => window.addFile(f.name, f.content));
            openModal('uploadModal');
        };

        // --- COMENTÁRIOS ---
        window.postComment = () => {
            const text = document.getElementById('comInput').value;
            if(!text || !currentGameId) return;
            push(ref(db, `jogos/${currentGameId}/comments`), { user, text, date: Date.now() });
            document.getElementById('comInput').value = "";
        };

        function loadComments(id) {
            onValue(ref(db, `jogos/${id}/comments`), (snap) => {
                const l = document.getElementById('comment-list'); l.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    l.innerHTML += `<div style="font-size:12px; margin-bottom:5px"><b style="color:var(--neon)">${d.user}:</b> ${d.text}</div>`;
                });
            });
        }

        // --- ASSETS (BIBLIOTECA) ---
        window.saveAsset = async () => {
            const name = document.getElementById('asset-name').value;
            const code = document.getElementById('asset-code').value;
            await push(ref(db, 'assets'), { name, code, author: user });
            closeModal('assetModal');
        };

        function loadAssets() {
            onValue(ref(db, 'assets'), (snap) => {
                const grid = document.getElementById('asset-grid'); grid.innerHTML = "";
                snap.forEach(c => {
                    const a = c.val();
                    grid.innerHTML += `<div class="card" style="padding:15px"><h4>${a.name}</h4><button class="btn btn-outline" onclick="navigator.clipboard.writeText(\`${a.code}\`); alert('Copiado!')">COPIAR CÓDIGO</button></div>`;
                });
            });
        }

        // --- PERFIL E STATS ---
        async function loadProfileStats() {
            const snap = await get(ref(db, 'jogos'));
            let l=0, v=0;
            snap.forEach(c => {
                const g = c.val();
                if(g.author === user) {
                    if(g.likes) l += Object.keys(g.likes).length;
                    v += (g.views || 0);
                }
            });
            const followersSnap = await get(ref(db, `users/${user}/followers`));
            const f = followersSnap.exists() ? Object.keys(followersSnap.val()).length : 0;
            
            document.getElementById('p-likes').innerText = l;
            document.getElementById('p-views').innerText = v;
            document.getElementById('p-follows').innerText = f;
            
            const xp = (l * 10) + (v * 2);
            const progress = xp % 100;
            document.getElementById('p-bar').style.width = progress + "%";
            
            const badge = document.getElementById('p-rank');
            if(xp > 500 || user === "PlanetOfc") { badge.innerText = "LENDA"; badge.className = "rank-badge rank-lenda"; }
            else { badge.innerText = "DEVELOPER"; badge.className = "rank-badge"; }
        }

        // --- ESTÚDIOS ---
        window.createGroup = async () => {
            const nome = document.getElementById('new-group-name').value;
            if(!nome) return;
            await push(ref(db, 'grupos'), { nome, membros: { [user.toLowerCase()]: true } });
            loadGroups();
        };

        function loadGroups() {
            onValue(ref(db, 'grupos'), (snap) => {
                const l = document.getElementById('g-list-display'); l.innerHTML = "";
                const sel = document.getElementById('g-owner'); sel.innerHTML = '<option value="personal">Pessoal</option>';
                snap.forEach(c => {
                    const g = c.val();
                    if(g.membros && g.membros[user.toLowerCase()]) {
                        l.innerHTML += `<div style="background:#111; padding:10px; margin-bottom:5px; border-radius:5px">🚀 ${g.nome}</div>`;
                        sel.innerHTML += `<option value="${c.key}">${g.nome}</option>`;
                    }
                });
            });
        }

        loadHub();
    </script>
</body>
</html>
