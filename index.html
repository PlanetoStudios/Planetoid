<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid | v12.8 </title>
    <style>
        :root { --neon: #00ffcc; --purple: #b800ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #f0f0f0; font-family: 'Courier New', monospace; text-align: center; }
        .btn { background: var(--purple); color: white; border: 2px solid #7a00aa; padding: 10px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; border-radius: 4px; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        input, textarea { background: #000; color: var(--neon); border: 1px solid #333; padding: 10px; width: 90%; margin-bottom: 10px; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #111; border: 2px solid #333; border-radius: 10px; padding-bottom: 15px; overflow: hidden; }
        .game-banner { width: 100%; height: 140px; object-fit: cover; background: #222; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 2% auto; padding: 20px; border: 2px solid var(--neon); width: 90%; max-width: 800px; }
        iframe { width: 100%; height: 65vh; background: #fff; border: none; border-radius: 5px; }
        .file-entry { background: #151515; padding: 10px; margin-bottom: 10px; border-left: 3px solid var(--purple); text-align: left; }
    </style>
</head>
<body>

    <h1 style="color:var(--neon); text-shadow: 0 0 10px var(--neon);">PLANETOID ENGINE v12.8</h1>

    <div id="auth-screen" style="width:300px; display:inline-block; margin-top: 50px;">
        <input type="text" id="authUser" placeholder="USUÁRIO">
        <input type="password" id="authPass" placeholder="SENHA">
        <button class="btn" style="width:100%" onclick="handleAuth('login')">ACESSAR HUB</button>
        <button class="btn" style="width:100%; background:#222" onclick="handleAuth('signup')">NOVO PILOTO</button>
    </div>

    <div id="main-hub" style="display:none;">
        <div style="background: #111; padding: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--neon);">
            CONECTADO: <span id="myName" style="color:var(--neon)"></span> | 
            <button onclick="logout()" class="btn" style="padding:2px 10px; background:red; border:none;">SAIR</button>
        </div>
        <button class="btn" onclick="prepareUpload()" style="font-size: 1.2rem; padding: 15px 30px;">[+] NOVO PROJETO</button>
        <div id="game-grid"></div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon)">CONFIGURAR PROJETO</h2>
            <input type="text" id="gameName" placeholder="Título do Jogo">
            <input type="file" onchange="optimizeImg(this)">
            <img id="imgPreview" style="width:100%; height:100px; object-fit:cover; display:none; margin-top:10px;">
            <div id="files-container" style="margin-top:20px;"></div>
            <button class="btn" onclick="addFileField()">+ ARQUIVO</button>
            <div style="margin-top:20px; padding-top:15px; border-top: 1px solid #333;">
                <input type="hidden" id="editGameId">
                <button class="btn" onclick="saveGame()" style="background:green">GRAVAR NO FIREBASE</button>
                <button class="btn" style="background:#444" onclick="closeModal('uploadModal')">FECHAR</button>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" style="max-width:98%">
            <button class="btn" style="float:right; background:red" onclick="closeModal('playerModal')">X</button>
            <h2 id="playTitle" style="color:var(--neon); margin:0 0 10px 0;"></h2>
            <iframe id="player-frame"></iframe>
            <div id="debug-console" style="background:#000; color:#0f0; height:80px; overflow:auto; text-align:left; padding:10px; font-size:12px; border:1px solid #222;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AUTH ---
        window.handleAuth = async (type) => {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value;
            if(!user || !pass) return alert("Preencha os campos!");
            try {
                const snap = await get(child(ref(db), 'usuarios/' + user));
                if(type === 'signup'){ await set(ref(db, 'usuarios/' + user), { password: pass }); loginSuccess(user); }
                else if(snap.exists() && snap.val().password === pass) loginSuccess(user);
                else alert("Usuário ou senha inválidos.");
            } catch(e) { alert("Erro de conexão."); }
        };

        function loginSuccess(u){
            localStorage.setItem('planetoid_user', u);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-hub').style.display = 'block';
            document.getElementById('myName').innerText = u.toUpperCase();
            loadGames();
        }
        window.logout = () => { localStorage.removeItem('planetoid_user'); location.reload(); };

        // --- GRID E CARREGAMENTO (SISTEMA DE SEGURANÇA MÁXIMA) ---
        function loadGames() {
            const me = localStorage.getItem('planetoid_user');
            onValue(ref(db, 'jogos'), (snapshot) => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = "";
                
                snapshot.forEach((childSnapshot) => {
                    const key = childSnapshot.key;
                    const g = childSnapshot.val();
                    
                    // Se g for nulo ou inválido, pula para o próximo
                    if(!g) return;

                    // Criamos o card usando blocos try/catch para cada elemento
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    let name = g.name || "Projeto Sem Nome";
                    let logo = g.logo || "";
                    
                    card.innerHTML = `
                        <img src="${logo}" class="game-banner" onerror="this.src='https://via.placeholder.com/400x225?text=Planetoid'">
                        <div style="padding:10px">
                            <h3 style="margin:5px 0; font-size:1.1rem">${name}</h3>
                            <button class="btn" style="width:100%" onclick="window.playGame('${key}')">JOGAR</button>
                            <div style="display:flex; gap:5px; margin-top:5px">
                                <button class="btn" style="flex:1; background:#333; font-size:0.8rem" onclick="window.editGame('${key}')">EDITAR</button>
                                <button class="btn" style="flex:1; background:#600; font-size:0.8rem" onclick="window.deleteGame('${key}')">DELETAR</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        // --- FUNÇÕES GLOBAIS ---
        window.playGame = async (id) => {
            try {
                const s = await get(ref(db, 'jogos/' + id));
                const g = s.val();
                document.getElementById('playTitle').innerText = g.name;
                openModal('playerModal');
                
                let html = "", css = "", js = "";
                if(g.files) {
                    g.files.forEach(f => {
                        if(f.name.endsWith('.html')) html += f.content;
                        else if(f.name.endsWith('.css')) css += `<style>${f.content}</style>`;
                        else if(f.name.endsWith('.js')) js += f.content;
                    });
                }
                
                const frame = document.getElementById('player-frame');
                const doc = frame.contentWindow.document;
                doc.open();
                doc.write(`<!DOCTYPE html><html><head>${css}</head><body style="margin:0; background:#fff;">${html || '<h1>Planetoid Game</h1>'}</body></html>`);
                
                const script = doc.createElement('script');
                script.text = `try { ${js} } catch(e) { console.error(e); }`;
                doc.body.appendChild(script);
                doc.close();
            } catch(e) { alert("Erro ao carregar o jogo."); }
        };

        window.editGame = async (id) => {
            try {
                const s = await get(ref(db, 'jogos/' + id));
                const g = s.val();
                document.getElementById('editGameId').value = id;
                document.getElementById('gameName').value = g.name || "";
                document.getElementById('files-container').innerHTML = "";
                if(g.files) g.files.forEach(f => addFileField(f.name, f.content));
                else addFileField("index.html", "<h1>Projeto Recuperado</h1>");
                openModal('uploadModal');
            } catch(e) { alert("Erro ao abrir editor."); }
        };

        window.deleteGame = async (id) => {
            if(confirm("Tem certeza que deseja DELETAR este projeto permanentemente?")) {
                try {
                    await remove(ref(db, 'jogos/' + id));
                } catch(e) { alert("Erro ao deletar."); }
            }
        };

        window.saveGame = async () => {
            const id = document.getElementById('editGameId').value;
            const name = document.getElementById('gameName').value;
            const files = [];
            document.querySelectorAll('.file-entry').forEach(el => {
                files.push({ name: el.querySelector('.f-name').value, content: el.querySelector('.f-content').value });
            });
            const data = { name, files, logo: window.currentImg || "", author: localStorage.getItem('planetoid_user') };
            
            try {
                if(id) await update(ref(db, 'jogos/' + id), data);
                else await push(ref(db, 'jogos'), data);
                closeModal('uploadModal');
            } catch(e) { alert("Erro ao salvar."); }
        };

        window.addFileField = (name = "index.html", content = "") => {
            const div = document.createElement('div');
            div.className = 'file-entry';
            div.innerHTML = `
                <input type="text" class="f-name" value="${name}" style="width:60%">
                <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; padding:5px; border-radius:3px">X</button>
                <textarea rows="5" class="f-content" style="width:100%; margin-top:5px">${content}</textarea>`;
            document.getElementById('files-container').appendChild(div);
        };

        window.prepareUpload = () => {
            document.getElementById('editGameId').value = "";
            document.getElementById('gameName').value = "";
            document.getElementById('files-container').innerHTML = "";
            addFileField("index.html", "<h1>Olá Mundo</h1>");
            openModal('uploadModal');
        };

        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => { document.getElementById(id).style.display = "none"; };

        if(localStorage.getItem('planetoid_user')) loginSuccess(localStorage.getItem('planetoid_user'));
    </script>
</body>
</html>
