<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid Studio | v19.0 Full Engine</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root { 
            --purple: #b800ff; --dark: #050505; --neon: #00ffcc;
            --red: #ff3333; --gold: #ffd700;
        }
        
        body { 
            margin: 0; background: #ffffff;
            background: linear-gradient(180deg, #ffffff 70%, #000000 100%);
            background-attachment: fixed; color: #333; 
            font-family: 'Press Start 2P', cursive; text-align: center; 
            min-height: 100vh; font-size: 10px; line-height: 1.5;
        }

        /* --- UI & NAV --- */
        .nav-bar { 
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; 
            background: rgba(255, 255, 255, 0.4); 
            padding: 15px; position: sticky; top: 0; z-index: 100; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--purple);
        }
        .nav-item { cursor: pointer; color: #555; font-size: 9px; text-transform: uppercase; padding: 8px 12px; transition: 0.2s; }
        .nav-item.active { color: var(--purple); border-bottom: 2px solid var(--purple); text-shadow: 0 0 5px rgba(184,0,255,0.5); }

        .btn { 
            background: rgba(184, 0, 255, 0.2); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--purple); color: #000; 
            padding: 10px 15px; cursor: pointer; border-radius: 12px; 
            font-family: 'Press Start 2P', cursive; font-size: 8px; margin: 5px; 
            transition: 0.2s ease;
        }
        .btn:hover { transform: scale(1.05); background: var(--purple); color: white; }
        .btn-outline { background: rgba(255,255,255,0.2); border: 2px solid #333; color: #333; }
        .btn-delete { background: var(--red); color: white; border-color: #000; }

        /* --- GRIDS --- */
        .container { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active-container { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #game-grid, #asset-grid, #leaderboard, #destaque-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 10px; 
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.5); 
            border-radius: 15px; overflow: hidden; text-align: left; transition: 0.2s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--purple); }
        .game-banner { width: 100%; height: 120px; object-fit: cover; background: #eee; }

        /* --- MODAIS --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            margin: 5% auto; padding: 25px; width: 90%; max-width: 700px; 
            border-radius: 15px; border: 4px solid var(--purple); 
        }
        
        input, textarea, select { 
            background: rgba(255,255,255,0.6); border: 2px solid #aaa; padding: 10px; 
            width: 90%; margin-bottom: 10px; border-radius: 8px; font-family: 'Press Start 2P'; font-size: 8px;
        }

        .stats-row { display: flex; justify-content: space-around; font-size: 7px; color: #444; padding: 8px; border-top: 1px dashed #ccc; }
        .online-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <div id="auth-screen" style="padding-top: 80px;">
        <img src="https://i.imgur.com/lq3tNk9.jpeg" style="height: 80px; border-radius: 15px; border: 3px solid #000;">
        <h1 style="color:var(--purple); font-size: 18px;">PLANETOID STUDIO</h1>
        <div style="max-width: 300px; margin: 0 auto; background: rgba(255,255,255,0.3); padding: 20px; border-radius: 15px; border: 2px solid #fff;">
            <input type="text" id="user-input" placeholder="Usuário">
            <input type="password" id="pass-input" placeholder="Senha">
            <button class="btn" style="width:100%" onclick="handleAuth('login')">ENTRAR</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="handleAuth('register')">CRIAR CONTA</button>
        </div>
    </div>

    <div id="main-hub" style="display:none">
        <div class="nav-bar">
            <div class="nav-item active" onclick="showTab('hub', this)">GAMES</div>
            <div class="nav-item" onclick="showTab('destaques', this)">DESTAQUES</div>
            <div class="nav-item" onclick="showTab('assets', this)">SCRIPTS</div>
            <div class="nav-item" onclick="showTab('perfil', this)">RANKING</div>
        </div>

        <div id="hub" class="container active-container">
            <button class="btn" onclick="prepareUpload()">[+] NOVO PROJETO</button>
            <button class="btn btn-outline" onclick="openModal('groupModal')">ESTÚDIOS</button>
            <div id="game-grid"></div>
        </div>

        <div id="destaques" class="container">
            <h2 style="color: var(--gold); text-shadow: 1px 1px 0 #000;">🏆 MAIS JOGADOS</h2>
            <div id="destaque-grid"></div>
        </div>

        <div id="assets" class="container">
            <button class="btn" onclick="openModal('assetModal')">+ POSTAR SCRIPT</button>
            <div id="asset-grid"></div>
        </div>

        <div id="perfil" class="container">
            <div id="leaderboard"></div>
            <button class="btn" style="background:var(--red); color:#fff; margin-top:40px" onclick="location.reload()">SAIR</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>EDITOR DE PROJETO</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="g-name" placeholder="Nome do Jogo">
            <div id="files-list"></div>
            <button class="btn btn-outline" onclick="addFileField()">+ ARQUIVO</button>
            <hr>
            <button class="btn" onclick="saveGame()">PUBLICAR</button>
            <button class="btn btn-outline" onclick="closeModal('uploadModal')">FECHAR</button>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" style="max-width: 850px;">
            <button class="btn" style="float:right;" onclick="closeModal('playerModal')">X</button>
            <h3 id="play-title"></h3>
            <iframe id="game-engine" sandbox="allow-scripts allow-same-origin" style="width:100%; height:450px; border:3px solid #000; background:#fff;"></iframe>
            <div style="margin-top:10px;">
                <button class="btn" onclick="likeGame()">❤️ CURTIR</button>
                <div id="comments-list" style="max-height:80px; overflow-y:auto; font-size:8px; text-align:left; padding:10px;"></div>
                <input type="text" id="com-input" placeholder="Comentar..." style="width:70%;">
                <button class="btn" onclick="postComment()">OK</button>
            </div>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h3>ESTÚDIOS</h3>
            <div id="my-groups-list"></div>
            <input type="text" id="new-group-name" placeholder="Nome do Estúdio">
            <button class="btn" onclick="createGroup()">CRIAR</button>
            <hr>
            <h4>CONVIDAR</h4>
            <select id="select-group-invite"></select>
            <input type="text" id="invite-user-target" placeholder="Nome do Dev">
            <button class="btn" onclick="sendInvite()">ENVIAR</button>
            <div id="pending-invites"></div>
            <button class="btn" onclick="closeModal('groupModal')">FECHAR</button>
        </div>
    </div>

    <div id="assetModal" class="modal">
        <div class="modal-content">
            <h3>POSTAR SCRIPT</h3>
            <input type="text" id="as-name" placeholder="Título">
            <textarea id="as-code" style="height:150px" placeholder="Cole seu código aqui..."></textarea>
            <button class="btn" onclick="saveAsset()">POSTAR</button>
            <button class="btn btn-outline" onclick="closeModal('assetModal')">FECHAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, get, onValue, update, remove, increment, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let user = "";
        let userDisplay = "";
        let currentPlayingId = null;

        // Proteção XSS
        window.escapeHTML = (str) => {
            if(!str) return "";
            return String(str).replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag]));
        };

        // --- AUTH (SHA256 Fix para iPad) ---
        window.handleAuth = async (type) => {
            const uRaw = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value;
            if(!uRaw || !p) return alert("Preencha tudo!");
            
            const uSafe = uRaw.toLowerCase();
            const hashedP = CryptoJS.SHA256(p).toString();
            const uRef = ref(db, `users/${uSafe}`);
            const snap = await get(uRef);

            if(type === 'register') {
                if(snap.exists()) return alert("Já existe!");
                await set(uRef, { password: hashedP, xp: 0, level: 1, displayName: uRaw });
                alert("Criado!");
            } else {
                if(!snap.exists() || snap.val().password !== hashedP) return alert("Erro!");
            }
            
            user = uSafe;
            userDisplay = snap.exists() ? (snap.val().displayName || uRaw) : uRaw;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-hub').style.display = 'block';
            initHub();
        };

        // --- GESTÃO DE JOGOS ---
        window.addFileField = (n = "index.html", c = "") => {
            const d = document.createElement('div');
            d.innerHTML = `<input type="text" class="f-n" value="${escapeHTML(n)}" style="width:30%"><textarea class="f-c" style="height:60px">${escapeHTML(c)}</textarea><button onclick="this.parentElement.remove()">X</button>`;
            document.getElementById('files-list').appendChild(d);
        };

        window.prepareUpload = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('g-name').value = "";
            document.getElementById('files-list').innerHTML = "";
            addFileField();
            openModal('uploadModal');
        };

        window.saveGame = async () => {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('g-name').value.trim();
            const files = [];
            document.querySelectorAll('#files-list div').forEach(e => {
                files.push({ name: e.querySelector('.f-n').value, content: e.querySelector('.f-c').value });
            });
            const data = { name, files, author: user, authorDisplay: userDisplay, updatedAt: Date.now() };
            if(id) await update(ref(db, `jogos/${id}`), data);
            else await push(ref(db, 'jogos'), data);
            closeModal('uploadModal');
        };

        window.deleteGame = async (id) => {
            if(confirm("Deseja deletar este jogo permanentemente?")) {
                await remove(ref(db, `jogos/${id}`));
                alert("Jogo removido.");
            }
        };

        function loadGames() {
            onValue(ref(db, 'jogos'), (snap) => {
                const grid = document.getElementById('game-grid');
                const destaqueGrid = document.getElementById('destaque-grid');
                grid.innerHTML = ""; destaqueGrid.innerHTML = "";
                
                let lista = [];
                snap.forEach(c => { lista.push({ id: c.key, ...c.val() }); });

                // Lógica de Destaques (Top 5 mais vistos)
                let destaques = [...lista].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 5);

                lista.forEach(g => {
                    const isOwner = (g.author === user || user === "planetofc");
                    const likes = g.likes ? Object.keys(g.likes).length : 0;
                    const ccu = g.ccu ? Object.keys(g.ccu).length : 0;
                    
                    const card = `
                        <div class="card">
                            <img src="https://i.imgur.com/nfcjTXC.png" class="game-banner">
                            <div style="padding:10px">
                                <b>${escapeHTML(g.name)}</b><br><small>Por: ${escapeHTML(g.authorDisplay)}</small>
                                <div class="stats-row"><span>❤️ ${likes}</span> <span>👁️ ${g.views || 0}</span> <span>🌐 ${ccu}</span></div>
                                <button class="btn" style="width:100%" onclick="playGame('${g.id}')">JOGAR</button>
                                ${isOwner ? `
                                    <button class="btn btn-outline" style="width:45%" onclick="editGame('${g.id}')">EDITAR</button>
                                    <button class="btn btn-delete" style="width:45%" onclick="deleteGame('${g.id}')">APAGAR</button>
                                ` : ''}
                            </div>
                        </div>`;
                    grid.innerHTML += card;
                });

                destaques.forEach(g => {
                    destaqueGrid.innerHTML += `
                        <div class="card" style="border: 2px solid var(--gold)">
                            <div style="padding:15px"><b>🔥 ${escapeHTML(g.name)}</b><br><span>Visto ${g.views || 0} vezes</span>
                            <button class="btn" style="width:100%; margin-top:10px" onclick="playGame('${g.id}')">JOGAR AGORA</button></div>
                        </div>`;
                });
            });
        }

        window.playGame = async (id) => {
            currentPlayingId = id;
            const s = await get(ref(db, `jogos/${id}`));
            const g = s.val();
            update(ref(db, `jogos/${id}`), { views: increment(1) });
            const ccuRef = ref(db, `jogos/${id}/ccu/${user}`);
            set(ccuRef, true); onDisconnect(ccuRef).remove();

            document.getElementById('play-title').innerText = g.name;
            openModal('playerModal');
            const frame = document.getElementById('game-engine');
            const doc = frame.contentWindow.document;
            let h="", c="", j="";
            g.files.forEach(f => {
                if(f.name.endsWith('.html')) h+=f.content;
                else if(f.name.endsWith('.css')) c+=`<style>${f.content}</style>`;
                else if(f.name.endsWith('.js')) j+=f.content;
            });
            doc.open(); doc.write(`<html><head>${c}</head><body>${h}<script>${j}<\/script></body></html>`); doc.close();
            loadComments(id);
        };

        window.editGame = async (id) => {
            const s = await get(ref(db, `jogos/${id}`));
            const g = s.val();
            document.getElementById('edit-id').value = id;
            document.getElementById('g-name').value = g.name;
            document.getElementById('files-list').innerHTML = "";
            g.files.forEach(f => addFileField(f.name, f.content));
            openModal('uploadModal');
        };

        // --- ESTÚDIOS ---
        window.createGroup = async () => {
            const n = document.getElementById('new-group-name').value.trim();
            if(n) await push(ref(db, 'grupos'), { nome: n, membros: { [user]: true } });
        };

        window.sendInvite = async () => {
            const target = document.getElementById('invite-user-target').value.trim().toLowerCase();
            const gid = document.getElementById('select-group-invite').value;
            const gname = document.getElementById('select-group-invite').selectedOptions[0].text;
            await push(ref(db, `invites/${target}`), { from: userDisplay, groupId: gid, groupName: gname });
            alert("Enviado!");
        };

        // --- RANKING ---
        function loadLeaderboard() {
            onValue(ref(db, 'users'), (snap) => {
                const l = document.getElementById('leaderboard'); l.innerHTML = "<h2>TOP DEVS</h2>";
                let ps = []; snap.forEach(u => { ps.push({ name: u.val().displayName || u.key, ...u.val() }); });
                ps.sort((a, b) => (b.xp || 0) - (a.xp || 0)).forEach((p, i) => {
                    l.innerHTML += `<div class="card" style="padding:10px">#${i+1} ${escapeHTML(p.name)} - LVL ${p.level}</div>`;
                });
            });
        }

        // --- SOCIAL ---
        window.likeGame = () => set(ref(db, `jogos/${currentPlayingId}/likes/${user}`), true);
        window.postComment = () => {
            const t = document.getElementById('com-input').value.trim();
            if(t) push(ref(db, `jogos/${currentPlayingId}/comments`), { user: userDisplay, text: t });
            document.getElementById('com-input').value = "";
        };
        function loadComments(id) {
            onValue(ref(db, `jogos/${id}/comments`), (snap) => {
                const d = document.getElementById('comments-list'); d.innerHTML = "";
                snap.forEach(c => { d.innerHTML += `<div><b>${escapeHTML(c.val().user)}:</b> ${escapeHTML(c.val().text)}</div>`; });
            });
        }

        // --- AUXILIARES UI ---
        window.showTab = (id, el) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active-container'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-container');
            el.classList.add('active');
            if(id === 'perfil') loadLeaderboard();
        };
        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => document.getElementById(id).style.display = "none";

        function initHub() {
            loadGames();
            onValue(ref(db, 'grupos'), (snap) => {
                const sel = document.getElementById('select-group-invite'); sel.innerHTML = "";
                snap.forEach(c => { if(c.val().membros[user]) sel.innerHTML += `<option value="${c.key}">${c.val().nome}</option>`; });
            });
        }
    </script>
</body>
</html>
