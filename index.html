<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetoid | .v12.5</title>
    <style>
        :root { --neon: #00ffcc; --purple: #b800ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #f0f0f0; font-family: 'Courier New', monospace; text-align: center; }
        .btn { background: var(--purple); color: white; border: 3px solid #7a00aa; padding: 10px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        input, textarea { background: #000; color: var(--neon); border: 1px solid #333; padding: 10px; width: 90%; margin-bottom: 10px; font-family: inherit; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #111; border: 2px solid #222; border-radius: 10px; padding-bottom: 15px; }
        .game-banner { width: 100%; height: 140px; object-fit: cover; background: #222; }
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 2% auto; padding: 20px; border: 2px solid var(--neon); width: 90%; max-width: 800px; border-radius: 10px; }
        iframe { width: 100%; height: 60vh; background: #fff; border: 4px solid #222; border-radius: 10px; }
        #debug-console { background: #000; color: #0f0; height: 100px; overflow-y: auto; font-size: 0.8rem; padding: 10px; border: 1px solid #333; margin-top: 10px; text-align: left; }
        .file-entry { background: #151515; padding: 10px; border-left: 4px solid var(--purple); margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>

    <h1 style="color:var(--neon); text-shadow: 0 0 10px var(--neon);">PLANETOID v12.5</h1>

    <div id="auth-screen" style="width:300px; display:inline-block; margin-top: 50px;">
        <input type="text" id="authUser" placeholder="USUÁRIO">
        <input type="password" id="authPass" placeholder="SENHA">
        <button class="btn" style="width:100%" onclick="handleAuth('login')">ENTRAR</button>
        <button class="btn" style="width:100%; background:#333" onclick="handleAuth('signup')">CADASTRAR</button>
    </div>

    <div id="main-hub" style="display:none;">
        <p>Logado como: <span id="myName" style="color:var(--neon)"></span> | <button onclick="logout()" class="btn" style="padding:2px 10px">X</button></p>
        <button class="btn" onclick="prepareUpload()">+ CRIAR PROJETO</button>
        <div id="game-grid"></div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon)">ESTAÇÃO DE TRABALHO</h2>
            <input type="text" id="gameName" placeholder="Título do Jogo">
            <input type="file" onchange="optimizeImg(this)">
            <img id="imgPreview" style="width:100%; height:100px; object-fit:cover; display:none; margin-bottom:10px;">
            
            <div id="files-container"></div>
            <button class="btn" onclick="addFileField()">+ ADICIONAR ARQUIVO (.js, .html, .css)</button>
            
            <div style="margin-top:20px;">
                <input type="hidden" id="editGameId">
                <button class="btn" onclick="saveGame()">SALVAR NO BANCO</button>
                <button class="btn" style="background:#444" onclick="closeModal('uploadModal')">VOLTAR</button>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" style="max-width:95%">
            <button class="btn" style="float:right; background:red" onclick="closeModal('playerModal')">FECHAR</button>
            <h2 id="playTitle" style="color:var(--neon); margin:0 0 10px 0;"></h2>
            <iframe id="player-frame" sandbox="allow-scripts allow-modals allow-pointer-lock allow-same-origin"></iframe>
            <div id="debug-console"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeygtxefJrCt_nYA6MsoKG7bhj0Yzxgok",
            authDomain: "planetoid-8.firebaseapp.com",
            projectId: "planetoid-8",
            storageBucket: "planetoid-8.firebasestorage.app",
            messagingSenderId: "451347049552",
            appId: "1:451347049552:web:f3239e9e33e17fd351f555"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.currentImg = "";

        // --- AUTH ---
        window.handleAuth = async (type) => {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value;
            if(!user || !pass) return alert("Preencha tudo!");
            const snap = await get(child(ref(db), 'usuarios/' + user));
            if(type === 'signup'){
                await set(ref(db, 'usuarios/' + user), { password: pass }); loginSuccess(user);
            } else if(snap.exists() && snap.val().password === pass) loginSuccess(user);
            else alert("Erro de login!");
        };

        function loginSuccess(u){
            localStorage.setItem('planetoid_user', u);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-hub').style.display = 'block';
            document.getElementById('myName').innerText = u.toUpperCase();
            loadGames();
        }
        window.logout = () => { localStorage.removeItem('planetoid_user'); location.reload(); };

        // --- IMAGENS ---
        window.optimizeImg = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 225;
                    canvas.getContext('2d').drawImage(img, 0, 0, 400, 225);
                    window.currentImg = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('imgPreview').src = window.currentImg;
                    document.getElementById('imgPreview').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        };

        // --- SALVAR/CARREGAR ---
        window.saveGame = async () => {
            const id = document.getElementById('editGameId').value;
            const name = document.getElementById('gameName').value.trim();
            const files = [];
            document.querySelectorAll('.file-entry').forEach(el => {
                files.push({ name: el.querySelector('.f-name').value, content: el.querySelector('.f-content').value });
            });
            const gameData = { name, files, logo: window.currentImg, author: localStorage.getItem('planetoid_user'), lastUpdate: Date.now() };
            if(id) await update(ref(db, 'jogos/' + id), gameData);
            else await push(ref(db, 'jogos'), gameData);
            closeModal('uploadModal');
        };

        function loadGames() {
            onValue(ref(db, 'jogos'), (s) => {
                const grid = document.getElementById('game-grid'); grid.innerHTML = "";
                s.forEach(c => {
                    const g = c.val();
                    const key = c.key;
                    const canEdit = (g.author === localStorage.getItem('planetoid_user') || localStorage.getItem('planetoid_user') === 'planetofc');
                    grid.innerHTML += `
                        <div class="game-card">
                            <img src="${g.logo || ''}" class="game-banner">
                            <div style="padding:10px">
                                <h3>${g.name}</h3>
                                <button class="btn" style="width:100%" onclick="window.playGame('${key}')">JOGAR</button>
                                ${canEdit ? `<button class="btn" style="background:#222; width:100%;" onclick="window.editGame('${key}')">EDITAR</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        // --- MOTOR DE EXECUÇÃO (ULTRA REFORÇADO) ---
        window.playGame = async (id) => {
            const s = await get(ref(db, 'jogos/' + id));
            const g = s.val();
            document.getElementById('playTitle').innerText = g.name;
            document.getElementById('debug-console').innerHTML = "> Abrindo canal de dados...";
            openModal('playerModal');

            let html = "", css = "", js = "";
            g.files.forEach(f => {
                if(f.name.endsWith('.html')) html += f.content;
                else if(f.name.endsWith('.css')) css += `<style>${f.content}</style>`;
                else if(f.name.endsWith('.js')) js += `<script>${f.content}<\/script>`;
            });

            // Injetor de logs para o console do Planetoid
            const logScript = `<script>
                window.onerror = (m, u, l) => parent.postMessage({t:'err', m: m + ' (L:' + l + ')'}, '*');
                console.log = (m) => parent.postMessage({t:'log', m: m}, '*');
            <\/script>`;

            const finalDoc = `<!DOCTYPE html><html><head>${logScript}${css}</head><body>${html || '<h1>Sem HTML</h1>'}${js}</body></html>`;
            
            const blob = new Blob([finalDoc], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const frame = document.getElementById('player-frame');
            
            frame.src = url;
        };

        window.addEventListener('message', (e) => {
            const con = document.getElementById('debug-console');
            if(e.data.t === 'err') con.innerHTML += `<div style="color:red">> ERRO: ${e.data.m}</div>`;
            if(e.data.t === 'log') con.innerHTML += `<div style="color:cyan">> LOG: ${e.data.m}</div>`;
            con.scrollTop = con.scrollHeight;
        });

        // --- EDITOR ---
        window.addFileField = (name = "index.html", content = "") => {
            const div = document.createElement('div');
            div.className = 'file-entry';
            div.innerHTML = `
                <input type="text" class="f-name" value="${name}" style="width:60%; margin:0">
                <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; padding:5px; cursor:pointer">REMOVER</button>
                <textarea rows="6" class="f-content" style="width:100%; margin-top:5px">${content}</textarea>`;
            document.getElementById('files-container').appendChild(div);
        };

        window.editGame = async (id) => {
            const s = await get(ref(db, 'jogos/' + id));
            const g = s.val();
            document.getElementById('editGameId').value = id;
            document.getElementById('gameName').value = g.name;
            window.currentImg = g.logo || "";
            if(g.logo) { document.getElementById('imgPreview').src = g.logo; document.getElementById('imgPreview').style.display = "block"; }
            document.getElementById('files-container').innerHTML = "";
            g.files.forEach(f => addFileField(f.name, f.content));
            openModal('uploadModal');
        };

        window.prepareUpload = () => {
            document.getElementById('editGameId').value = "";
            document.getElementById('gameName').value = "";
            document.getElementById('imgPreview').style.display = "none";
            document.getElementById('files-container').innerHTML = "";
            window.currentImg = "";
            addFileField("index.html", "<h1>Olá Mundo!</h1>");
            openModal('uploadModal');
        };

        window.openModal = (id) => document.getElementById(id).style.display = "block";
        window.closeModal = (id) => { 
            document.getElementById(id).style.display = "none"; 
            if(id === 'playerModal') document.getElementById('player-frame').src = "about:blank";
        };

        if(localStorage.getItem('planetoid_user')) loginSuccess(localStorage.getItem('planetoid_user'));
    </script>
</body>
</html>
